<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S-003 Mission Detail Modal — AI Camp Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:        #5ab4d6;
      --navy:       #1e3a5f;
      --navy-mid:   #2a4a7a;
      --gold:       #f5c518;
      --gold-s:     #c9a010;
      --white:      #ffffff;
      --lb:         #b3d4e8;
      --green:      #4caf50;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--sky);
      background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 16px 16px;
    }

    /* ══════════════════════════════════════════
       S-002 BACKGROUND (static, sits under dim)
    ══════════════════════════════════════════ */
    .pixel-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-earth { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: #6b3d1e; }
    .bg-earth::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: repeating-linear-gradient(90deg, #8b5020 0, #8b5020 8px, #6b3d1e 8px, #6b3d1e 16px); }
    .bg-grass { position: absolute; bottom: 30px; left: 0; right: 0; height: 44px; background: #5dab25; }
    .bg-grass::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #3d7a1a; }
    .bg-grass::before { content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
      background: repeating-linear-gradient(90deg, #5dab25 0, #5dab25 8px, transparent 8px, transparent 16px); }

    .px-tree { position: absolute; bottom: 74px; line-height: 0; }
    .px-tree svg { image-rendering: pixelated; display: block; }
    .px-cloud { position: absolute; line-height: 0; pointer-events: none; }
    .px-cloud svg { image-rendering: pixelated; display: block; }

    /* S-002 content (header + cards, for bg context) */
    .s002-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      display: flex;
      justify-content: center;
    }
    .s002-inner {
      width: 448px;
      padding: 36px 0 0;
    }
    .s002-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .s002-title { font-family: 'Press Start 2P', monospace; font-size: 12px; color: #fff;
      line-height: 1.6; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
    .s002-name { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #fff; }
    .s002-prog { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .s002-squares { display: flex; gap: 5px; flex: 1; }
    .sq { display: block; width: 18px; height: 18px; background: var(--navy); border: 2px solid rgba(255,255,255,0.25); }
    .sq.filled { background: var(--gold); border-color: var(--gold); }
    .s002-count { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fff; }
    .s002-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .s002-card {
      background: var(--navy);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 5px;
      height: 90px;
    }
    .s002-card.done { border-color: rgba(76,175,80,0.6); opacity: 0.85; }
    .s002-card.active { border-color: rgba(245,197,24,0.8); box-shadow: 0 0 12px rgba(245,197,24,0.3); }

    /* Scanlines */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    }

    /* ══════════════════════════════════════════
       DIM OVERLAY
    ══════════════════════════════════════════ */
    .dim-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* ══════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════ */
    .modal {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 100px);
      background: var(--navy);
      border: 2px solid var(--white);
      border-radius: 0;
      padding: 32px;
      z-index: 20;
      overflow-y: auto;
      scrollbar-width: none;
      animation: modal-in 0.2s ease-out;
    }
    .modal::-webkit-scrollbar { display: none; }

    @keyframes modal-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* LEVEL UP badge — offset above modal */
    .level-up-badge {
      position: absolute;
      top: -18px;
      left: 24px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 0;
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
      box-shadow: 2px 2px 0 var(--gold-s);
      white-space: nowrap;
    }

    /* Close button */
    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 20px;
      font-weight: 300;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.1s;
      padding: 4px;
    }
    .close-btn:hover { opacity: 1; }

    /* Mission header */
    .mission-header { margin-top: 16px; margin-bottom: 24px; }
    .mission-label {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .mission-title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }

    /* ── Markdown body ── */
    .markdown-body { margin-bottom: 0; }

    .markdown-body h3 {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--gold);
      margin: 20px 0 10px;
      line-height: 1.4;
    }
    .markdown-body h3:first-child { margin-top: 0; }

    .markdown-body p {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--white);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .markdown-body ul {
      padding-left: 20px;
      margin-bottom: 14px;
    }
    .markdown-body li {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--lb);
      line-height: 1.7;
      margin-bottom: 4px;
    }
    .markdown-body li a {
      color: var(--gold);
      text-decoration: underline;
    }

    .markdown-body blockquote {
      border-left: 3px solid var(--gold);
      padding: 10px 16px;
      margin: 16px 0;
      background: rgba(245,197,24,0.06);
    }
    .markdown-body blockquote p {
      font-size: 13px;
      color: var(--lb);
      margin-bottom: 0;
      font-style: italic;
    }

    .markdown-body code {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      background: var(--navy-mid);
      color: var(--white);
      padding: 2px 6px;
      line-height: 1.8;
    }

    /* Divider */
    .modal-divider {
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 28px 0;
    }

    /* ── Upload section ── */
    .upload-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--white);
      margin-bottom: 10px;
    }

    .upload-box {
      border: 2px solid rgba(255,255,255,0.55);
      background: var(--navy-mid);
      min-height: 120px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 0;
      transition: border-color 0.1s, background 0.1s;
      overflow: hidden;
      position: relative;
    }
    .upload-box:hover {
      border-color: rgba(255,255,255,0.85);
      background: rgba(42,74,122,0.8);
    }

    .upload-hint {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      color: var(--lb);
      text-align: center;
      pointer-events: none;
    }

    #previewImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .photo-thumb {
      position: relative;
      aspect-ratio: 1;
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .photo-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-thumb-del {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      transition: background 0.1s;
    }
    .photo-thumb-del:hover { background: rgba(229,57,53,0.85); }

    .photo-add-cell {
      aspect-ratio: 1;
      background: rgba(42,74,122,0.6);
      border: 2px dashed rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
      flex-direction: column;
      gap: 4px;
    }
    .photo-add-cell:hover { border-color: rgba(255,255,255,0.7); background: rgba(42,74,122,0.9); }
    .photo-add-cell span { font-family: 'Noto Sans KR', sans-serif; font-size: 11px;
      color: var(--lb); text-align: center; line-height: 1.4; }
    .photo-add-cell .plus { font-size: 20px; color: var(--lb); }
    .review-state { display: none; flex-direction: column; gap: 14px; }
    .review-state.visible { display: flex; }

    .review-divider { height: 1px; background: rgba(255,255,255,0.15); }

    .review-text-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--white);
      margin-bottom: -6px;
    }
    .review-text-label span { font-weight: 300; color: var(--lb); font-size: 12px; }
    .delete-photo-btn:hover { background: rgba(229,57,53,0.8); }
    .delete-photo-btn.visible { display: flex; }
    .upload-textarea {
      width: 100%;
      margin-top: 10px;
      height: 80px;
      background: var(--navy-mid);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 0;
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 300;
      padding: 10px 12px;
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.1s;
    }
    .upload-textarea::placeholder { color: rgba(179,212,232,0.45); }
    .upload-textarea:focus { border-color: var(--gold); background: rgba(42,74,122,0.85); }
    .btn-complete {
      margin-top: 20px;
      width: 100%;
      height: 52px;
      background: var(--gold);
      border: 2px solid var(--navy);
      border-radius: 0;
      color: var(--navy);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      position: relative;
      top: 0; left: 0;
      box-shadow: 3px 3px 0 var(--gold-s);
      transition: top 0.05s, left 0.05s, box-shadow 0.05s, background 0.1s;
      letter-spacing: 0.03em;
    }
    .btn-complete:disabled {
      background: rgba(245,197,24,0.38);
      box-shadow: none;
      cursor: not-allowed;
      color: rgba(30,58,95,0.6);
    }
    .btn-complete:not(:disabled):hover { background: #f7cc30; }
    .btn-complete:not(:disabled):active { top: 3px; left: 3px; box-shadow: 0 0 0 var(--gold-s); }

    /* ══════════════════════════════════════════
       CLEAR! CELEBRATION OVERLAY
    ══════════════════════════════════════════ */
    .clear-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .clear-overlay.active { display: flex; }

    .clear-box {
      position: relative;
      text-align: center;
      animation: clear-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .clear-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 52px;
      color: var(--gold);
      text-shadow: 4px 4px 0 var(--gold-s), 0 0 40px rgba(245,197,24,0.7);
      animation: clear-glow 0.5s ease-in-out infinite alternate;
      line-height: 1;
    }

    .clear-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      margin-top: 18px;
      font-weight: 400;
    }

    /* Sparkles around CLEAR! text */
    .cs {
      position: absolute;
      font-style: normal;
      line-height: 1;
      animation: cs-pop 1.6s ease-in-out infinite;
    }
    .cs.s1 { top: -40px; left: -30px;  font-size: 20px; color: var(--gold);  animation-delay: 0s; }
    .cs.s2 { top: -30px; right: -40px; font-size: 14px; color: #fff;          animation-delay: 0.35s; }
    .cs.s3 { top: 50%;   left: -60px;  font-size: 22px; color: var(--gold);  animation-delay: 0.7s; transform: translateY(-50%); }
    .cs.s4 { top: 50%;   right: -55px; font-size: 16px; color: #fff;          animation-delay: 0.2s; transform: translateY(-50%); }
    .cs.s5 { bottom: -30px; left: 20%; font-size: 18px; color: var(--gold);  animation-delay: 0.55s; }
    .cs.s6 { bottom: -35px; right: 20%; font-size: 12px; color: #fff;         animation-delay: 0.9s; }
    .cs.s7 { top: -50px; left: 40%;    font-size: 24px; color: var(--gold);  animation-delay: 0.15s; }

    @keyframes clear-bounce {
      0%  { transform: scale(0.3) rotate(-6deg); opacity: 0; }
      65% { transform: scale(1.12) rotate(1deg); opacity: 1; }
      100%{ transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes clear-glow {
      from { text-shadow: 4px 4px 0 var(--gold-s), 0 0 20px rgba(245,197,24,0.5); }
      to   { text-shadow: 4px 4px 0 var(--gold-s), 0 0 60px rgba(245,197,24,1); }
    }
    @keyframes cs-pop {
      0%, 100% { opacity: 0.1; transform: scale(0.6); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }
    .cs.s3 { animation-name: cs-pop-mid; }
    .cs.s4 { animation-name: cs-pop-mid; }
    @keyframes cs-pop-mid {
      0%, 100% { opacity: 0.1; transform: translateY(-50%) scale(0.6); }
      50%       { opacity: 1;   transform: translateY(-50%) scale(1.4); }
    }
  </style>
</head>

<div class="modal" id="modal">

  <!-- LEVEL UP! sticker -->

  <!-- Close -->
  <button class="close-btn" id="closeBtn" aria-label="닫기">✕</button>

  <!-- Mission header -->

    <span class="mission-label">MISSION 04</span>
    <h2 class="mission-title">데이터 분석</h2>
  </div>

  <!-- Markdown body -->
  <div class="markdown-body">
    <h3>미션</h3>
    <ul>
      <li>엑셀 파일에서 원하는 데이터를 AI를 활용해서 분석해보세요.</li>
    </ul>
  </div>

  <!-- Text answer section -->
  <div class="answer-section">
    <p class="upload-label">📝 답변 입력</p>
    <textarea class="upload-textarea" id="answerText" style="height:100px;" placeholder="여기에 답변을 입력해주세요."></textarea>
  </div>

  <!-- CTA -->
  <button class="btn-complete" id="btnComplete" disabled>제출</button>

     CLEAR! Celebration overlay
══════════════════════════════════════════ -->
<div class="clear-overlay" id="clearOverlay">
  <div class="clear-box">
    <em class="cs s1">✦</em>
    <em class="cs s2">✦</em>
    <em class="cs s3">✦</em>
    <em class="cs s4">✦</em>
    <em class="cs s5">✦</em>
    <em class="cs s6">✦</em>
    <em class="cs s7">✦</em>
    <div class="clear-text">CLEAR!</div>
    <p class="clear-sub">미션을 완료했어요 🎉</p>
  </div>
</div>

<script>
  const modal       = document.getElementById('modal');
  const dimOverlay  = document.getElementById('dimOverlay');
  const closeBtn    = document.getElementById('closeBtn');
  const btnComplete = document.getElementById('btnComplete');
  const answerText  = document.getElementById('answerText');
  const clearOverlay = document.getElementById('clearOverlay');

  function closeModal() {
    modal.style.animation = 'none';
    modal.style.opacity = '0';
    modal.style.transform = 'translateX(-50%) translateY(-8px)';
    modal.style.transition = 'opacity 0.18s, transform 0.18s';
    setTimeout(() => { modal.style.display = 'none'; dimOverlay.style.display = 'none'; }, 200);
  }
  closeBtn.addEventListener('click', closeModal);
  dimOverlay.addEventListener('click', closeModal);

  answerText.addEventListener('input', () => {
    btnComplete.disabled = answerText.value.trim().length === 0;
  });

  btnComplete.addEventListener('click', () => {
    if (btnComplete.disabled) return;
    clearOverlay.classList.add('active');
    setTimeout(() => { clearOverlay.classList.remove('active'); closeModal(); }, 2200);
  });
</script>
