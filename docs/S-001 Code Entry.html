<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S-001 Code Entry — AI Camp Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:        #5ab4d6;
      --navy:       #1e3a5f;
      --gold:       #f5c518;
      --gold-shadow:#c9a010;
      --white:      #ffffff;
      --light-blue: #b3d4e8;
      --error:      #e53935;
    }

    html, body { width: 100%; height: 100%; }

    body {
      background-color: var(--sky);
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 16px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── Pixel RPG background ── */
    .pixel-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-earth {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: #6b3d1e;
    }
    .bg-earth::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg, #8b5020 0, #8b5020 8px, #6b3d1e 8px, #6b3d1e 16px
      );
    }

    .bg-grass {
      position: absolute;
      bottom: 30px; left: 0; right: 0;
      height: 44px;
      background: #5dab25;
    }
    .bg-grass::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: #3d7a1a;
    }
    .bg-grass::before {
      content: '';
      position: absolute;
      top: -8px; left: 0; right: 0;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #5dab25 0, #5dab25 8px,
        transparent 8px, transparent 16px
      );
    }

    .px-tree {
      position: absolute;
      bottom: 74px;
      line-height: 0;
    }
    .px-tree svg { image-rendering: pixelated; display: block; }

    .px-cloud {
      position: absolute;
      line-height: 0;
      pointer-events: none;
    }
    .px-cloud svg { image-rendering: pixelated; display: block; }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
    }

    /* ── Login card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 448px;
      background-color: var(--navy);
      border: 2px solid var(--white);
      border-radius: 6px;
      padding: 48px 40px 44px;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.07);
    }

    /* Corner gold accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--gold);
    }
    .card::before { top: -2px; left: -2px; }
    .card::after  { top: -2px; right: -2px; }

    .card .corner-bl, .card .corner-br {
      position: absolute;
      width: 8px; height: 8px;
      background: var(--gold);
    }
    .card .corner-bl { bottom: -2px; left: -2px; }
    .card .corner-br { bottom: -2px; right: -2px; }

    /* ── Title ── */
    .service-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: var(--white);
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.02em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }

    .subtitle {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: var(--light-blue);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* ── Form ── */
    .form { display: flex; flex-direction: column; gap: 12px; }

    .input-label {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--light-blue);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .code-input {
      width: 100%;
      height: 48px;
      background-color: rgba(255,255,255,0.06);
      border: 2px solid var(--white);
      border-radius: 4px;
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.1s, background-color 0.1s;
      -webkit-appearance: none;
      appearance: none;
    }
    .code-input::placeholder { color: rgba(179,212,232,0.45); font-size: 15px; }
    .code-input:focus { border-color: var(--gold); background-color: rgba(245,197,24,0.06); }
    .code-input.error { border-color: var(--error); background-color: rgba(229,57,53,0.07); }

    /* ── CTA Button ── */
    .btn-enter {
      margin-top: 8px;
      width: 100%;
      height: 52px;
      background-color: var(--gold);
      border: 2px solid var(--navy);
      border-radius: 4px;
      color: var(--navy);
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      cursor: pointer;
      position: relative;
      top: 0; left: 0;
      box-shadow: 3px 3px 0 var(--gold-shadow);
      transition: top 0.05s, left 0.05s, box-shadow 0.05s;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }
    .btn-enter:hover { background-color: #f7cc30; }
    .btn-enter:active { top: 3px; left: 3px; box-shadow: 0 0 0 var(--gold-shadow); }

    /* ── Error ── */
    .error-area {
      min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .error-msg {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; color: var(--error);
      text-align: center; opacity: 0; transition: opacity 0.2s;
    }
    .error-msg.visible { opacity: 1; }
    .error-pixel { width: 8px; height: 8px; background-color: var(--error); flex-shrink: 0; display: none; }
    .error-pixel.visible { display: block; }

    /* ── Footer ── */
    .hint {
      margin-top: 28px;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(179,212,232,0.4);
      letter-spacing: 0.1em;
      line-height: 2;
    }
  
    /* Moving cloud animation */
    @keyframes cloud-pass {
      from { transform: translateX(1600px); }
      to   { transform: translateX(-350px); }
    }
  </style>
</head>

<div class="card" role="main">
  <div class="corner-bl"></div>

  <h1 class="service-title">AI CAMP TUTORIAL</h1>
  <p class="subtitle">이름과 전화번호 뒷 4자리를 입력해주세요</p>

  <div class="form">
    <div class="input-wrapper">
      <label class="input-label" for="code-input">ACCESS CODE</label>
      <input
        class="code-input error"
        id="code-input"
        type="text"
        placeholder="홍길동1234"
        autocomplete="off"
        spellcheck="false"
        maxlength="20"
      />
    </div>

    <div class="error-area">
      <div class="error-pixel visible"></div>
      <p class="error-msg visible">코드를 다시 확인해주세요</p>
    </div>

    <button class="btn-enter" type="button">입장하기</button>
  </div>

  <p class="hint">
    S-001 &nbsp;·&nbsp; AI CAMP TUTORIAL<br/>
    © 2026 AI CAMP
  </p>
</div>

<script>
  const input    = document.getElementById('code-input');
  const errorMsg = document.querySelector('.error-msg');
  const errorPx  = document.querySelector('.error-pixel');
  const btn      = document.querySelector('.btn-enter');

  const clearError = () => { input.classList.remove('error'); errorMsg.classList.remove('visible'); errorPx.classList.remove('visible'); };
  const showError  = () => { input.classList.add('error');    errorMsg.classList.add('visible');    errorPx.classList.add('visible');    };

  input.addEventListener('input', () => { if (input.value.length > 0) clearError(); });
  btn.addEventListener('click', () => {
    if (input.value.trim().length < 3) { showError(); input.focus(); }
    else { clearError(); btn.textContent = '접속 중...'; setTimeout(() => { btn.textContent = '입장하기'; }, 1200); }
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
</script>
